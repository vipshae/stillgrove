<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Meditation Tree – Test</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0ebe3;
      font-family: sans-serif;
    }
    #app {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    #sketch-container {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    #controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 220px;
    }
    label {
      font-weight: 600;
      color: #5a4a3a;
    }
    input[type="range"] {
      width: 100%;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      background: #8ba888;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #6f8b6c;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sketch-container"></div>
    <div id="controls">
      <div>
        <label>Total Hours <span id="hours-val">1.0</span></label>
        <input type="range" id="hours" min="0" max="60" step="0.1" value="1" />
      </div>
      <div>
        <label>SQS <span id="sqs-val">0.70</span></label>
        <input type="range" id="sqs" min="0" max="1" step="0.01" value="0.7" />
      </div>
      <div class="row">
        <input type="text" id="seed" placeholder="Seed (e.g. user-id)" style="flex:1" />
        <button id="apply-seed">Apply Seed</button>
      </div>
      <button id="end-session-btn" style="width:100%">End Session (+1 hr)</button>
    </div>
  </div>
  <script type="module" src="./src/test-tree.ts"></script>
</body>
</html>
